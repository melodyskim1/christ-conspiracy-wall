  ot: `"The LORD has sworn and will not change his mind, \u2018You are a [A:priest forever] after the order of [B:Melchizedek].\u2019"\n\n"And [B:Melchizedek] [C:king of Salem] brought out [D:bread and wine]. (He was [A:priest] of God Most High.) And he blessed him..."`,
  nt: `"So also Christ did not exalt himself to be made a [A:high priest], but was appointed by him who said to him... \u2018You are a [A:priest forever], after the order of [B:Melchizedek].\u2019"\n\u2014 Hebrews 5:5\u20136\n\n"For it is evident that our Lord was descended from [E:Judah], and in connection with that tribe Moses said nothing about [A:priests]."\n\u2014 Hebrews 7:14\n\n"We have such a high priest, one who is seated at the [C:right hand of the throne] of the Majesty in heaven."\n\u2014 Hebrews 8:1`,
  hlKey: '[A] Priest \u2014 but not from Levi; from an older, superior order \u00b7 [B] Melchizedek \u2014 king AND priest, predating the Levitical system \u00b7 [C] King of Salem / right hand of the throne \u00b7 [D] Bread and wine \u2014 the elements of the Lord\u2019s Supper \u00b7 [E] Judah \u2014 the tribal problem resolved by a priesthood that predates Levi',
  sources: 'Vos, The Teaching of the Epistle to the Hebrews; Lane, Hebrews (WBC); Morales, Who Shall Ascend',
  conns: ['T4', 'L3', 'C2', 'C5', 'S6'],
  threads: ['access']
},
{
  id: 'L7', cat: 'Liturgical',
  title: 'He Died on Day Six and Said "Finished"',
  desc: 'God finished creation on day six and rested on the seventh. Jesus dies on Friday, says "It is finished," rests in the tomb on the Sabbath, and rises on day one.',
  date: '~30 AD', year: 30,
  whoa: `In the creation account, God works for six days and rests on the seventh \u2014 not from exhaustion but because the work is complete. Jesus dies on Friday \u2014 day six \u2014 and his final word is "It is finished" (tetelestai). He rests in the tomb on the Sabbath (day seven). He rises on Sunday \u2014 the first day of the new week. The early church recognized the resurrection as the inauguration of new creation.`,
  otRef: 'Genesis 2:1\u20133',
  ot: `"Thus the heavens and the earth were [A:finished], and all the host of them. And on the [B:seventh day] God [A:finished] his work that he had done, and he [C:rested] on the seventh day."`,
  nt: `"When Jesus had received the sour wine, he said, \u2018[A:It is finished],\u2019 and he bowed his head and gave up his spirit."\n\u2014 John 19:30\n\n"So there remains a [C:Sabbath rest] for the people of God, for whoever has entered God\u2019s rest has also [A:rested from his works] as God did from his."\n\u2014 Hebrews 4:9\u201310\n\n"Therefore, if anyone is in Christ, he is a [D:new creation]."\n\u2014 2 Corinthians 5:17`,
  hlKey: '[A] "Finished" \u2014 the same concept in creation and crucifixion \u00b7 [B] Seventh day \u2014 Jesus in the tomb on the Sabbath \u00b7 [C] Rest \u2014 God rested because creation was done; Christ rests because redemption is done \u00b7 [D] New creation \u2014 resurrection on the first day inaugurates what Genesis began',
  sources: 'Kline, Kingdom Prologue; Vos, Biblical Theology; Bavinck, Reformed Dogmatics vol. 4',
  conns: ['S3', 'T6', 'C1', 'S9'],
  threads: ['thirdday']
},
// ── COVENANTAL ──
{
  id: 'C1', cat: 'Covenantal',
  title: 'The First Promise, Spoken to the Serpent',
  desc: 'Before the humans even receive their consequences, God speaks to the serpent: one descendant of the woman will crush its head. The entire Bible grows from this seed.',
  date: '~4000 BC', year: -4000,
  whoa: `Immediately after the fall \u2014 before the humans even receive their consequences \u2014 God speaks to the serpent and makes the first promise of redemption in all of Scripture. One specific descendant of the woman will crush the serpent\u2019s head, though the serpent will wound his heel. This single verse is the seed from which the entire biblical narrative grows. The phrasing "seed of the woman" is unusual \u2014 in the ancient world, offspring was traced through the father \u2014 which may be the earliest hint of the virgin birth.`,
  otRef: 'Genesis 3:15',
  ot: `"I will put enmity between you and the woman, and between your [A:offspring] and [B:her offspring]; [C:he shall bruise your head], and [D:you shall bruise his heel]."`,
  nt: `"But when the fullness of time had come, God sent forth his Son, [B:born of woman]."\n\u2014 Galatians 4:4\n\n"The God of peace will soon [C:crush Satan under your feet]."\n\u2014 Romans 16:20\n\n"And the great dragon was thrown down, that [A:ancient serpent], who is called the devil and Satan... And they have conquered him by the [D:blood of the Lamb]."\n\u2014 Revelation 12:9, 11`,
  hlKey: '[A] Serpent\u2019s offspring vs. woman\u2019s offspring \u2014 the cosmic conflict introduced \u00b7 [B] "Her offspring" / "born of woman" \u2014 unusual phrasing pointing to the virgin birth \u00b7 [C] Head crushed \u2014 the fatal blow to Satan \u00b7 [D] Heel bruised \u2014 the wound costs the deliverer something',
  sources: 'Vos, Biblical Theology; Robertson, The Christ of the Covenants; Hamilton, God\u2019s Glory in Salvation Through Judgment; Collins, Genesis 1\u20134',
  conns: ['T3', 'S1', 'P8', 'C2'],
  threads: ['covenant']
},
{
  id: 'C2', cat: 'Covenantal',
  title: 'God Walked Through the Pieces Alone',
  desc: 'In ancient covenant ceremonies, both parties walked through halved animals. But God put Abraham to sleep and walked through alone \u2014 taking the curse on himself.',
  date: '~2000 BC', year: -2000,
  whoa: `When God formalizes his covenant with Abraham, the ceremony follows an ancient Near Eastern pattern: animals are cut in half and arranged in two rows. Both parties would walk through \u2014 the implicit oath being "may I become like these animals if I break this covenant." But in Genesis 15, Abraham is put into a deep sleep, and God alone \u2014 represented by a smoking fire pot and a flaming torch \u2014 passes between the pieces. God takes the covenant curse entirely on himself.`,
  otRef: 'Genesis 15:9\u201312, 17\u201318 (~2000 BC)',
  ot: `"He said to him, \u2018Bring me a heifer three years old, a female goat three years old, a ram three years old, a turtledove, and a young pigeon.\u2019 And he brought him all these, [A:cut them in half], and laid each half over against the other..."\n\n"As the sun was going down, a [B:deep sleep] fell on Abram... When the sun had gone down and it was dark, behold, a [C:smoking fire pot and a flaming torch] [D:passed between these pieces]. On that day the LORD made a covenant with Abram."\n\n"In you [E:all the families of the earth shall be blessed]." \u2014 Genesis 12:3`,
  nt: `"And the Scripture, foreseeing that God would justify the [E:Gentiles by faith], preached the gospel beforehand to Abraham, saying, \u2018In you shall [E:all the nations be blessed].\u2019"\n\u2014 Galatians 3:8\n\n"Christ [D:redeemed us from the curse of the law by becoming a curse for us]."\n\u2014 Galatians 3:13`,
  hlKey: '[A] Animals cut in half \u2014 the covenant-ratification ritual \u00b7 [B] Abraham asleep \u2014 he doesn\u2019t walk through; he\u2019s a passive recipient \u00b7 [C] Fire and torch \u2014 God\u2019s presence \u00b7 [D] God passes through alone \u2194 Christ becomes a curse for us \u00b7 [E] All nations blessed \u2014 the universal scope',
  sources: 'Robertson, The Christ of the Covenants; Kline, Kingdom Prologue; Vos, Biblical Theology; Wright, The Climax of the Covenant',
  conns: ['T2', 'L6', 'S10', 'C3'],
  threads: ['covenant']
},
{
  id: 'C3', cat: 'Covenantal',
  title: 'A System Designed to Say "Not Enough"',
  desc: 'The sacrificial system had repetition built into its design: every morning, every evening, every year. The repetition was a confession of insufficiency.',
  date: '~1446 BC', year: -1446,
  whoa: `The Mosaic law \u2014 the sacrificial system, the purity codes, the tabernacle regulations \u2014 was an elaborate, costly, and beautiful system. But it had a feature built into its design that pointed beyond itself: it had to be repeated. Every morning and every evening, a lamb was sacrificed. Every year, the Day of Atonement cycle restarted. The repetition was not a flaw; it was a confession. Hebrews states it directly: "It is impossible for the blood of bulls and goats to take away sins."`,
  otRef: 'Leviticus 1:3\u20134; Exodus 29:38\u201339',
  ot: `"He shall lay his hand on the head of the burnt offering, and it shall be accepted for him [A:to make atonement for him]."\n\n"Now this is what you shall offer on the altar: two lambs a year old [B:day by day regularly]. One lamb you shall offer [B:in the morning], and the other lamb you shall offer [B:at twilight]."`,
  nt: `"For since the law has but a [C:shadow of the good things to come] instead of the true form of these realities, it can [D:never], by the same sacrifices that are [B:continually offered every year], make perfect those who draw near."\n\u2014 Hebrews 10:1\n\n"For it is [D:impossible for the blood of bulls and goats to take away sins]."\n\u2014 Hebrews 10:4\n\n"So then, the law was our [E:guardian] until Christ came, in order that we might be justified by faith."\n\u2014 Galatians 3:24\n\n"For Christ is the [F:end (telos)] of the law for righteousness to everyone who believes."\n\u2014 Romans 10:4`,
  hlKey: '[A] Atonement through sacrifice \u2014 the mechanism \u00b7 [B] Daily / continually / every year \u2014 the repetition that reveals insufficiency \u00b7 [C] Shadow \u2014 the law is explicitly called a shadow of the reality \u00b7 [D] "Never" / "impossible" \u2014 the system\u2019s own admission \u00b7 [E] Guardian / tutor \u2014 the law\u2019s pedagogical function \u00b7 [F] Telos \u2014 both "end" and "goal"',
  sources: 'Kline, Treaty of the Great King; Robertson, The Christ of the Covenants; Vos, Biblical Theology',
  conns: ['T1', 'L1', 'C6', 'P10'],
  threads: ['covenant', 'substitution', 'lamb']
},
{
  id: 'C4', cat: 'Covenantal',
  title: 'The War Bow Points at God',
  desc: 'The Hebrew word for rainbow is the same as "war bow." God places his weapon in the sky pointed upward \u2014 at himself. A disarmament image.',
  date: '~3000 BC', year: -3000,
  whoa: `After the flood, God makes a covenant with all creation \u2014 the broadest covenant in Scripture. The sign is the rainbow. But the Hebrew word for rainbow (qesheth) is the same word used for a war bow. God places his war bow in the sky \u2014 pointed upward, toward himself, not downward at the earth. The covenant sign itself is a disarmament image. God absorbs his own judgment rather than directing it at creation.`,
  otRef: 'Genesis 9:12\u201315',
  ot: `"And God said, \u2018This is the sign of the covenant that I make between me and you and every living creature... I have set my [A:bow] in the cloud, and it shall be a sign of the covenant between me and the earth. When I bring clouds over the earth and the [A:bow] is seen in the clouds, I will [B:remember my covenant]... and the waters shall [B:never again become a flood to destroy all flesh].\u2019"`,
  nt: `"...God\u2019s patience waited in the days of Noah, while the ark was being prepared, in which a few, that is, eight persons, were brought safely through [C:water]. [C:Baptism, which corresponds to this], now saves you."\n\u2014 1 Peter 3:20\u201321`,
  hlKey: '[A] Bow (qesheth) \u2014 war bow placed in the sky, pointed at God \u00b7 [B] "Never again" / remember \u2014 God\u2019s self-binding promise \u00b7 [C] Water that judges and saves \u2014 the flood as a type of baptism',
  sources: 'Kline, Kingdom Prologue; Robertson, The Christ of the Covenants; Vos, Biblical Theology',
  conns: ['S7', 'C1', 'S6'],
  threads: ['covenant']
},
{
  id: 'C5', cat: 'Covenantal',
  title: '600 Years with No King \u2014 Then an Angel',
  desc: 'God promised David an everlasting throne. Then the dynasty collapsed for 600 years. Then an angel told a teenager her son would receive "the throne of his father David."',
  date: '~1000 BC', year: -1000,
  whoa: `God promises David an everlasting dynasty: "Your throne shall be established forever." Then the dynasty collapses with the Babylonian exile in 586 BC. For roughly 600 years, there is no king on David\u2019s throne. Then an angel appears to a teenager in Nazareth and announces that her son will receive "the throne of his father David" and reign over a kingdom that "will have no end." And in Revelation, Jesus identifies himself: "I am the root AND the descendant of David" \u2014 both the source and the offspring.`,
  otRef: '2 Samuel 7:12\u201313, 16; Isaiah 9:6\u20137',
  ot: `"I will raise up your offspring after you... and I will establish the throne of his [A:kingdom forever]."\n\n"Your [A:throne] shall be established forever."\n\n"Of the increase of his government and of peace there will be [B:no end], on the [A:throne of David] and over his kingdom."`,
  nt: `"The Lord God will give to him the [A:throne of his father David], and he will reign over the house of Jacob forever, and of his [A:kingdom] there will be [B:no end]."\n\u2014 Luke 1:32\u201333\n\n"[C:I am the root and the descendant of David], the bright morning star."\n\u2014 Revelation 22:16`,
  hlKey: '[A] Throne / kingdom \u2014 promised to David, announced to Mary, claimed by Jesus \u00b7 [B] "No end" / "forever" \u2014 the same language in Isaiah and Luke \u00b7 [C] "Root AND descendant" \u2014 Jesus is both before David and after David, breaking linear time',
  sources: 'Robertson, The Christ of the Covenants; Dempster, Dominion and Dynasty; Vos, Biblical Theology',
  conns: ['P1', 'P4', 'T10', 'L6'],
  threads: ['covenant']
},
{
  id: 'C6', cat: 'Covenantal',
  title: 'Jesus Quotes Jeremiah Mid-Meal',
  desc: 'Jeremiah promised a "new covenant" \u2014 law on hearts, sins remembered no more. At the Last Supper, Jesus lifts a cup and says: "This cup is the new covenant in my blood."',
  date: '~600 BC', year: -600,
  whoa: `Jeremiah prophesied during the darkest period of Israel\u2019s history \u2014 the destruction of Jerusalem and the Babylonian exile. In the midst of catastrophe, he announced something unprecedented: a new covenant, different from the one made at Sinai, in which God would write his law on people\u2019s hearts and "remember their sins no more." Six centuries later, at the Last Supper, Jesus lifts a cup of wine and says: "This cup is the new covenant in my blood." The phrase "new covenant" is a direct citation of Jeremiah 31.`,
  otRef: 'Jeremiah 31:31\u201334 (~600 BC)',
  ot: `"Behold, the days are coming, declares the LORD, when I will make a [A:new covenant] with the house of Israel and the house of Judah, not like the covenant that I made with their fathers... For this is the covenant that I will make: [B:I will put my law within them, and I will write it on their hearts]... For [C:I will forgive their iniquity, and I will remember their sins no more]."`,
  nt: `"And likewise the cup after supper, saying, \u2018This cup is the [A:new covenant in my blood].\u2019"\n\u2014 Luke 22:20\n\n"In speaking of a [A:new covenant], he makes the first one obsolete."\n\u2014 Hebrews 8:13\n\n"And the Holy Spirit also bears witness to us; for after saying, \u2018This is the covenant that I will make with them after those days, declares the Lord: [B:I will put my laws on their hearts, and write them on their minds],\u2019 then he adds, \u2018[C:I will remember their sins and their lawless deeds no more].\u2019"\n\u2014 Hebrews 10:15\u201317`,
  hlKey: '[A] New covenant \u2014 Jeremiah\u2019s term, directly cited by Jesus at the Last Supper \u00b7 [B] Law on hearts \u2014 internal transformation the Mosaic covenant couldn\u2019t provide \u00b7 [C] Sins remembered no more \u2014 complete, permanent forgiveness',
  sources: 'Robertson, The Christ of the Covenants; Vos, Biblical Theology; Kline, Treaty of the Great King; Dumbrell, Covenant and Creation',
  conns: ['L1', 'C1', 'P2', 'L3'],
  threads: ['covenant']
},
// ── STRUCTURAL ──
{
  id: 'S1', cat: 'Structural',
  title: 'Barren, Barren, Barren, Barren... Virgin',
  desc: 'The Messiah\u2019s line passes through women who cannot conceive \u2014 and the impossibility escalates each generation until it reaches a virgin.',
  date: '~2000 BC', year: -2000,
  whoa: `The line through which the Messiah comes repeatedly passes through women who cannot conceive \u2014 and the degree of impossibility increases with each generation. The pattern teaches a theological principle: the seed-line is sustained by divine initiative, not human capability. The escalation from "unlikely" to "impossible" to "unprecedented" culminates in a conception with no human father at all.`,
  otRef: null,
  ot: `Sarah \u2014 old age (Genesis 18:11) \u2192 Isaac\nRebekah \u2014 barren (Genesis 25:21) \u2192 Jacob\nRachel \u2014 barren (Genesis 29:31) \u2192 Joseph\nManoah\u2019s wife \u2014 barren (Judges 13:2) \u2192 Samson\nHannah \u2014 barren (1 Samuel 1:2) \u2192 Samuel\nElizabeth \u2014 old age + barren (Luke 1:7) \u2192 John the Baptist\nMary \u2014 virgin (Luke 1:34) \u2192 Jesus`,
  nt: `"But to all who did receive him, who believed in his name, he gave the right to become children of God, who were born, not of blood nor of the will of the flesh nor of the will of man, but of God."\n\u2014 John 1:12\u201313`,
  hlKey: '',
  sources: 'Vos, Biblical Theology; Clowney, The Unfolding Mystery; Hamilton, God\u2019s Glory in Salvation Through Judgment',
  conns: ['P8', 'C1', 'C2'],
  threads: []
},
{
  id: 'S2', cat: 'Structural',
  title: 'From Abel\u2019s Lamb to the Lamb on the Throne',
  desc: 'The lamb is the single most sustained image in the Bible \u2014 from Genesis 3 to Revelation 22. Lambs multiply until replaced by one Lamb.',
  date: '~4000 BC', year: -4000,
  whoa: `The lamb is arguably the single most sustained image in the entire Bible, appearing from the third chapter of Genesis to the final chapter of Revelation. Tracing it in sequence reveals a trajectory: the lambs begin as individual substitutes, multiply into a daily institutional practice, then converge back into a single Lamb who replaces the entire system.`,
  otRef: null,
  ot: `God kills an animal to clothe the guilty humans \u2014 Genesis 3:21\nAbel offers a lamb and is accepted \u2014 Genesis 4:4\nAbraham: "God will provide for himself the lamb" \u2014 Genesis 22:8\nThe Passover lamb\u2019s blood saves from death \u2014 Exodus 12\nDaily temple lambs, morning and evening \u2014 Exodus 29:38\u201342\nIsaiah: "like a lamb that is led to the slaughter" \u2014 Isaiah 53:7`,
  nt: `John the Baptist: "Behold, the Lamb of God" \u2014 John 1:29\nPaul: "Christ, our Passover lamb, has been sacrificed" \u2014 1 Corinthians 5:7\nRevelation: the Lamb appears 28 times \u2014 slain but standing, on the throne, opening the scroll of history \u2014 Revelation 5\u201322`,
  hlKey: '',
  sources: 'Morales, Who Shall Ascend the Mountain of the Lord?; Beale, The Book of Revelation (NIGTC)',
  conns: ['T1', 'T2', 'P2', 'C1'],
  threads: ['lamb']
},
{
  id: 'S3', cat: 'Structural',
  title: 'Why "Third Day" Appears Everywhere',
  desc: 'The third day is the day of resolution throughout the OT \u2014 too consistent to be coincidental. Paul says Christ rose "on the third day according to the Scriptures" (plural).',
  date: '~2000 BC', year: -2000,
  whoa: `The third day functions throughout the Old Testament as the day of resolution, deliverance, and new beginning. The pattern appears across different books, genres, and centuries \u2014 too consistently to be coincidental, yet without any single OT verse explicitly stating "the Messiah will rise on the third day." When Paul says Christ was raised "on the third day according to the Scriptures" (plural), he may be pointing not to one prophecy but to this pervasive pattern.`,
  otRef: null,
  ot: `Abraham sees Mount Moriah on the third day \u2014 Genesis 22:4\nJoseph releases his brothers from prison on the third day \u2014 Genesis 42:18\nIsrael is to consecrate themselves to meet God on the third day at Sinai \u2014 Exodus 19:11\nJonah in the fish three days \u2014 Jonah 1:17\nHosea: "On the third day he will raise us up" \u2014 Hosea 6:2\nEsther approaches the king on the third day \u2014 Esther 5:1`,
  nt: `"He was raised on the third day in accordance with the Scriptures."\n\u2014 1 Corinthians 15:4\n\nThe plural "Scriptures" \u2014 not "Scripture" \u2014 suggests Paul is pointing to a pattern across multiple texts rather than a single proof-text.`,
  hlKey: '',
  sources: 'Beale, A New Testament Biblical Theology; Hamilton, God\u2019s Glory in Salvation Through Judgment; Wright, Resurrection of the Son of God',
  conns: ['T2', 'T11', 'L2', 'L7', 'H1'],
  threads: ['thirdday']
},
{
  id: 'S4', cat: 'Structural',
  title: 'Every Mountain Is the Same Meeting',
  desc: 'Mountains are consistently where God meets humanity: Ararat, Moriah, Sinai, Carmel, Transfiguration, Golgotha, Olivet. Each builds on the last.',
  date: '~2500 BC', year: -2500,
  whoa: `Throughout Scripture, mountains are consistently the places where God meets humanity, gives revelation, and accomplishes salvation. The pattern creates a geographic thread \u2014 each mountain encounter builds on the previous ones, and the prophets envision a final mountain where all nations gather.`,
  otRef: null,
  ot: `Ararat \u2014 new beginning after judgment (Gen 8)\nMoriah \u2014 sacrifice and provision (Gen 22)\nSinai \u2014 law given, covenant made (Exod 19\u201324)\nCarmel \u2014 true God vs. false gods (1 Kings 18)\n\n"It shall come to pass in the latter days that the mountain of the house of the LORD shall be established as the highest of the mountains... and all the nations shall flow to it." \u2014 Isaiah 2:2`,
  nt: `Mount of Beatitudes \u2014 new law from a new Moses (Matt 5\u20137)\nMount of Transfiguration \u2014 glory revealed, Moses and Elijah appear (Matt 17)\nGolgotha \u2014 sacrifice completed (Matt 27)\nMount of Olives \u2014 ascension and promised return (Acts 1)`,
  hlKey: '',
  sources: 'Morales, Who Shall Ascend the Mountain of the Lord?; Beale, The Temple and the Church\u2019s Mission',
  conns: ['G1', 'G4', 'P10', 'T7'],
  threads: ['access']
},
{
  id: 'S5', cat: 'Structural',
  title: 'He Arranged the Donkey, the Room, and the Cup',
  desc: 'Jesus doesn\u2019t stumble into prophecy \u2014 he actively orchestrates fulfillment. The donkey, the upper room, the Psalm 22 citation: all deliberate.',
  date: '~30 AD', year: 30,
  whoa: `One of the most underappreciated aspects of the Gospel narratives is the degree to which Jesus actively orchestrates prophetic fulfillment rather than passively experiencing it. He doesn\u2019t stumble into prophecy \u2014 he arranges the logistics. This pattern of deliberate enactment implies either profound prophetic self-awareness or an extraordinarily detailed level of later fabrication.`,
  otRef: null,
  ot: `Sends for a specific donkey from a specific village \u2014 Matthew 21:1\u20133 (fulfilling Zechariah 9:9)\nTimes his arrival in Jerusalem to Passover week\nTells disciples where to find the upper room \u2014 Mark 14:13\u201315\nInstitutes the Supper as Passover + covenant ceremony + Jeremiah 31 citation simultaneously\nQuotes Psalm 22:1 from the cross\nSays "I thirst" (John 19:28) "to fulfill the Scripture" \u2192 receives sour wine (Psalm 69:21)\nPredicts his own death and resurrection three times (Mark 8:31, 9:31, 10:33\u201334)`,
  nt: `Wright argues in Jesus and the Victory of God that these were deliberate prophetic actions (\u014dth) \u2014 symbolic public acts in the tradition of OT prophets like Jeremiah breaking a pot or Ezekiel lying on his side.`,
  hlKey: '',
  sources: 'Wright, Jesus and the Victory of God; Bauckham, Jesus and the Eyewitnesses; France, Matthew (NICNT)',
  conns: ['P4', 'P5', 'L1', 'S11', 'H5'],
  threads: []
},
{
  id: 'S6', cat: 'Structural',
  title: '"Something Greater Than the Temple Is Here"',
  desc: 'Jesus makes explicit claims to surpass every major institution and figure: the temple, Jonah, Solomon, Moses. The antitype is always "more."',
  date: '~30 AD', year: 30,
  whoa: `Jesus makes a series of explicit claims that he surpasses every major institution and figure in Israel\u2019s history. These aren\u2019t subtle implications \u2014 they\u2019re direct statements, usually made to people who would understand the weight of what he\u2019s claiming. Every type is surpassed. Vos calls this the "organic" growth of revelation: the seed contains the tree, but the tree is always more.`,
  otRef: null,
  ot: `"I tell you, something greater than the temple is here." \u2014 Matthew 12:6\n"Something greater than Jonah is here." \u2014 Matthew 12:41\n"Something greater than Solomon is here." \u2014 Matthew 12:42`,
  nt: `"Jesus has been counted worthy of more glory than Moses." \u2014 Hebrews 3:3\n\n"If perfection had been attainable through the Levitical priesthood... what further need would there have been for another priest to arise after the order of Melchizedek, rather than one named after the order of Aaron?" \u2014 Hebrews 7:11`,
  hlKey: '',
  sources: 'Vos, Biblical Theology; Beale, A New Testament Biblical Theology; Clowney, The Unfolding Mystery',
  conns: ['T1', 'T7', 'T11', 'P10', 'L6'],
  threads: []
},
{
  id: 'S7', cat: 'Structural',
  title: 'Water and Blood from One Wound',
  desc: 'John stresses that he personally witnessed blood and water from Jesus\u2019 pierced side. Water for purification, blood for atonement \u2014 both from one wound.',
  date: '~30 AD', year: 30,
  whoa: `John records that when a soldier pierced Jesus\u2019 side, "at once there came out blood and water" \u2014 and he pauses the narrative to stress that he personally witnessed this. Water and blood correspond to the two great ritual systems of the Old Testament: water for purification and blood for atonement. Both flow from a single wound. The parallel extends further: Adam\u2019s side was opened and Eve (the bride) came forth; Christ\u2019s side is opened and the church (the bride) comes forth.`,
  otRef: null,
  ot: `Adam\u2019s side opened \u2192 Eve (the bride) \u2014 Genesis 2:21\u201322\nThe rock struck \u2192 water flows \u2014 Exodus 17:6\nEzekiel\u2019s temple \u2192 river flows from its side, bringing life \u2014 Ezekiel 47:1\u20139`,
  nt: `"But one of the soldiers pierced his side with a spear, and at once there came out blood and water. He who saw it has borne witness \u2014 his testimony is true, and he knows that he is telling the truth \u2014 that you also may believe."\n\u2014 John 19:34\u201335`,
  hlKey: '',
  sources: 'Carson, The Gospel According to John; Beale, The Temple and the Church\u2019s Mission; Calvin, Commentary on John',
  conns: ['T8', 'P6', 'T7', 'C6'],
  threads: ['piercing']
},
{
  id: 'S8', cat: 'Structural',
  title: 'Three Items. Three Fulfillments.',
  desc: 'The Ark of the Covenant held three items. Each represented an Israel failure that Christ fulfills: the law, the manna, and the priestly rod.',
  date: '~1446 BC', year: -1446,
  whoa: `The Ark of the Covenant \u2014 God\u2019s throne on earth, housed in the Holy of Holies \u2014 contained exactly three items. Each item represented a failure of Israel that God transformed into a memorial of provision. And each item finds its fulfillment in a different aspect of Christ\u2019s work.`,
  otRef: null,
  ot: `Tablets of the Law (Exodus 25:16) \u2014 Israel broke the law\nJar of Manna (Exodus 16:33) \u2014 Israel complained about the bread\nAaron\u2019s Rod That Budded (Numbers 17:10) \u2014 Israel challenged the priesthood`,
  nt: `"Do not think that I have come to abolish the Law... I have not come to abolish them but to fulfill them." \u2014 Matthew 5:17\n\n"I am the bread of life; whoever comes to me shall not hunger." \u2014 John 6:35\n\n"[Christ was] designated a high priest... by the power of an indestructible life." \u2014 Hebrews 7:15\u201316`,
  hlKey: '',
  sources: 'Morales, Who Shall Ascend the Mountain of the Lord?; Beale, The Temple and the Church\u2019s Mission',
  conns: ['T6', 'L6', 'C3', 'T7'],
  threads: []
},
{
  id: 'S9', cat: 'Structural',
  title: 'Garden Opens the Bible. Garden-City Closes It.',
  desc: 'Genesis opens with a garden: tree of life, river, God dwelling with man. Revelation closes with a garden-city: same elements, expanded to cosmic scale.',
  date: '~4000 BC', year: -4000,
  whoa: `The Bible\u2019s opening and closing scenes share the same elements \u2014 tree of life, river, God dwelling with humanity, absence of death \u2014 but the ending surpasses the beginning. What was a garden becomes a garden-city. What sustained two people now heals the nations. What was localized fills everything. Everything between Genesis 2 and Revelation 22 is the story of how God gets from one to the other.`,
  otRef: null,
  ot: `"And the LORD God planted a [A:garden] in Eden... The [B:tree of life] was in the midst of the garden... A [C:river] flowed out of Eden to water the garden." \u2014 Genesis 2:8\u201310`,
  nt: `"Then the angel showed me the [C:river of the water of life], bright as crystal, flowing from the throne of God and of the Lamb... On either side of the river, the [B:tree of life] with its twelve kinds of fruit... and the leaves of the tree were for the [D:healing of the nations]."\n\n"Behold, the [E:dwelling place of God is with man]. He will [E:dwell with them]... He will wipe away every [F:tear] from their eyes, and [F:death shall be no more]."\n\n"And I saw [G:no temple in the city], for its temple is the Lord God the Almighty and the Lamb."\n\u2014 Revelation 21\u201322`,
  hlKey: '[A] Garden \u2192 Garden-city \u00b7 [B] Tree of life \u2014 present in both, expanded \u00b7 [C] River \u2014 same image, expanded \u00b7 [D] Healing of the nations \u2014 scope expands from two to all \u00b7 [E] God dwelling with humanity \u00b7 [F] No death \u2014 the reversal of Genesis 3 \u00b7 [G] No temple \u2014 God\u2019s presence fills all reality',
  sources: 'Beale, The Temple and the Church\u2019s Mission; Beale, A New Testament Biblical Theology; Kline, Kingdom Prologue',
  conns: ['T7', 'C1', 'L7', 'L1'],
  threads: []
},
{
  id: 'S10', cat: 'Structural',
  title: 'Outsiders Keep Showing Up in the Lineage',
  desc: 'The Messiah\u2019s bloodline includes a Canaanite prostitute, a Moabite, and "the wife of Uriah." Matthew names them all. Grace was never ethno-exclusive.',
  date: '~2000 BC', year: -2000,
  whoa: `God\u2019s promise to Abraham \u2014 "in you all the families of the earth shall be blessed" \u2014 doesn\u2019t wait until the New Testament to begin unfolding. Throughout the Old Testament, outsiders are persistently woven into the narrative at critical moments, often in the Messiah\u2019s own lineage. Matthew\u2019s genealogy of Jesus makes this impossible to miss by naming four women, three of whom are clearly outsiders.`,
  otRef: null,
  ot: `Rahab \u2014 Canaanite prostitute (Joshua 2) \u2192 in Jesus\u2019 genealogy\nRuth \u2014 Moabite, excluded by Deuteronomy 23:3 \u2192 in Jesus\u2019 genealogy\nTamar \u2014 plays the role of a prostitute (Genesis 38) \u2192 in Jesus\u2019 genealogy\nBathsheba \u2014 "the wife of Uriah" the Hittite \u2192 in Jesus\u2019 genealogy\nNaaman \u2014 Syrian commander healed (2 Kings 5)\nThe widow of Zarephath \u2014 Sidonian woman sustained by Elijah (1 Kings 17)\nNineveh \u2014 a Gentile city repents at Jonah\u2019s preaching (Jonah 3)`,
  nt: `"Go therefore and make disciples of all nations."\n\u2014 Matthew 28:19\n\n"There is neither Jew nor Greek, there is neither slave nor free, there is no male and female, for you are all one in Christ Jesus. And if you are Christ\u2019s, then you are Abraham\u2019s offspring, heirs according to promise."\n\u2014 Galatians 3:28\u201329`,
  hlKey: '',
  sources: 'Wright, The Climax of the Covenant; Beale, A New Testament Biblical Theology; Robertson, The Christ of the Covenants',
  conns: ['C2', 'T10', 'T11', 'T12'],
  threads: []
},
{
  id: 'S11', cat: 'Structural',
  title: 'Why Invent Women as Your Star Witnesses?',
  desc: 'In a culture where women\u2019s testimony was inadmissible in court, all four Gospels place women as the first witnesses to the empty tomb.',
  date: '~30 AD', year: 30,
  whoa: `If the Gospel writers fabricated the resurrection narrative, they made a series of choices that would actively undermine their credibility in their own cultural context. In first-century Jewish society, women\u2019s testimony was not accepted in legal proceedings. Yet all four Gospels \u2014 independently \u2014 place women as the first and primary witnesses to the empty tomb. Beyond this, the Gospels include multiple details that embarrass the heroes of the story: Peter denies Jesus three times, the disciples fall asleep when asked to pray, Thomas refuses to believe.`,
  otRef: null,
  ot: ``,
  nt: `"Now it was Mary Magdalene and Joanna and Mary the mother of James and the other women with them who told these things to the apostles, but these words seemed to them an idle tale, and they did not believe them."\n\u2014 Luke 24:10\u201311\n\nEven within the narrative, the male disciples don\u2019t believe the women\u2019s report \u2014 another detail that fabricators would be unlikely to include.`,
  hlKey: '',
  sources: 'Bauckham, Jesus and the Eyewitnesses; Licona, The Resurrection of Jesus; Wright, Resurrection of the Son of God; Bruce, New Testament Documents',
  conns: ['S5', 'H1', 'H4', 'H5'],
  threads: []
},
// ── GEOGRAPHIC ──
{
  id: 'G1', cat: 'Geographic',
  title: '"On This Mountain It Shall Be Provided"',
  desc: 'Abraham named Moriah "The LORD will provide" \u2014 in future tense. Solomon built the temple there. Golgotha sits on the same ridge.',
  date: '~2000 BC', year: -2000,
  whoa: `When Abraham names the place where he almost sacrificed Isaac, he uses a phrase in future tense: "On the mount of the LORD it shall be provided." 2 Chronicles 3:1 identifies Mount Moriah as the location where Solomon built the temple. Christian tradition places Golgotha on the same ridge. Three pivotal events converge on one geographic location: the near-sacrifice of Abraham\u2019s son, the temple where sacrifices were offered daily, and the crucifixion where the final sacrifice was made.`,
  otRef: 'Genesis 22:2, 14; 2 Chronicles 3:1',
  ot: `"Go to the land of [A:Moriah], and offer him there as a burnt offering on one of the mountains."\n\n"So Abraham called the name of that place, \u2018The LORD will provide\u2019; as it is said to this day, \u2018[B:On the mount of the LORD it shall be provided].\u2019"\n\n"Then Solomon began to build the house of the LORD in Jerusalem on [A:Mount Moriah]."`,
  nt: ``,
  hlKey: '[A] Moriah \u2014 the same location named for Abraham\u2019s sacrifice and Solomon\u2019s temple \u00b7 [B] Future tense \u2014 "it SHALL be provided" points beyond the immediate event',
  sources: 'Morales, Who Shall Ascend; Levenson, The Death and Resurrection of the Beloved Son; Beale, The Temple and the Church\u2019s Mission',
  conns: ['T2', 'T7', 'S4'],
  threads: ['access']
},
{
  id: 'G2', cat: 'Geographic',
  title: 'The Bread of Life Born in the House of Bread',
  desc: 'Bethlehem means "house of bread." Ruth met Boaz there during grain harvest. David was anointed there. The Bread of Life was born there.',
  date: '~1100 BC', year: -1100,
  whoa: `The Hebrew name Bethlehem (beth lehem) literally means "house of bread." This is where Ruth met Boaz \u2014 the kinsman-redeemer \u2014 during the grain harvest. This is where David, the shepherd-king, was born and anointed. And this is where the one who calls himself "the bread of life" is born. The town\u2019s name, its associations, and its prophetic role converge.`,
  otRef: null,
  ot: `"Beth lehem" = "house of bread" (Hebrew etymology)\n"A voice was heard in Ramah, weeping and loud lamentation, Rachel weeping for her children." \u2014 Jeremiah 31:15 \u2192 Matthew 2:18\n"The LORD said to Samuel... \u2018I will send you to Jesse the Bethlehemite, for I have provided for myself a king among his sons.\u2019" \u2014 1 Samuel 16:1`,
  nt: `"I am the bread of life; whoever comes to me shall not hunger."\n\u2014 John 6:35`,
  hlKey: '',
  sources: 'Robertson, The Christ of the Prophets; Clowney, The Unfolding Mystery',
  conns: ['P1', 'T10', 'T6', 'L5', 'C5'],
  threads: []
},
{
  id: 'G3', cat: 'Geographic',
  title: 'The Holiest One Goes to the Unclean Place',
  desc: 'In the Levitical system, "outside the camp" was where uncleanness went. Golgotha was outside the walls. Jesus went to the place of maximum contamination.',
  date: '~30 AD', year: 30,
  whoa: `In the Levitical system, "outside the camp" was where uncleanness went: lepers, those contaminated by contact with death, and the scapegoat bearing the people\u2019s sins. Golgotha was located outside the walls of Jerusalem. Hebrews makes the theological connection explicit: Jesus went to the place of maximum uncleanness so that the unclean could enter the place of maximum holiness.`,
  otRef: 'Leviticus 4:12; 13:46',
  ot: `"He shall carry the whole bull [A:outside the camp] to a clean place... and shall [A:burn it]."\n\n"He is unclean. He shall live alone. His dwelling shall be [A:outside the camp]."`,
  nt: `"So Jesus also suffered [A:outside the gate] in order to [B:sanctify the people through his own blood]. Therefore let us go to him [A:outside the camp] and bear the reproach he endured."\n\u2014 Hebrews 13:12\u201313`,
  hlKey: '[A] Outside the camp/gate \u2014 the location of uncleanness, where Jesus goes \u00b7 [B] Sanctify \u2014 the holiest one goes to the unclean place to make the unclean holy',
  sources: 'Morales, Who Shall Ascend; Lane, Hebrews (WBC)',
  conns: ['L4', 'T4', 'L3', 'P2'],
  threads: ['access']
},
{
  id: 'G4', cat: 'Geographic',
  title: 'Departure Point. Return Point. Same Mountain.',
  desc: 'The Mount of Olives: triumphal entry, Gethsemane, Olivet Discourse, ascension. The angels say he will return "in the same way" \u2014 to the same mountain.',
  date: '~520 BC', year: -520,
  whoa: `The Mount of Olives functions as a prophetic axis point in the narrative. Zechariah prophesied that the LORD\u2019s feet would stand on the Mount of Olives. Jesus enters Jerusalem from there, prays at Gethsemane at its base, delivers the Olivet Discourse from its summit, and ascends to heaven from its peak. The angels at the ascension say he will return "in the same way."`,
  otRef: 'Zechariah 14:4',
  ot: `"On that day his [A:feet] shall stand on the [B:Mount of Olives] that lies before Jerusalem on the east."`,
  nt: `"And when he had said these things, as they were looking on, he was [C:lifted up], and a cloud took him out of their sight... \u2018This Jesus, who was taken up from you into heaven, will [C:come in the same way as you saw him go into heaven].\u2019 Then they returned to Jerusalem from the mount called [B:Olivet]."\n\u2014 Acts 1:9\u201312`,
  hlKey: '[A] Feet standing \u2014 physical, bodily presence on this specific mountain \u00b7 [B] Mount of Olives \u2014 the geographic location named in both texts \u00b7 [C] Going and returning \u2014 departure and promised return, same location',
  sources: 'Wright, Jesus and the Victory of God; Beale, The Temple and the Church\u2019s Mission',
  conns: ['P4', 'S5', 'S9'],
  threads: []
},
{
  id: 'G5', cat: 'Geographic',
  title: 'Luke Calls the Cross an "Exodus"',
  desc: 'At the Transfiguration, Moses and Elijah speak with Jesus about his "exodus" \u2014 Luke uses the actual Greek word exodos for the cross.',
  date: '~1446 BC', year: -1446,
  whoa: `Egypt functions throughout Scripture as the archetypical place of bondage. When Luke describes the Transfiguration, he records that Moses and Elijah spoke with Jesus about his "exodus" \u2014 using the actual Greek word exodos \u2014 which he would accomplish in Jerusalem. Luke deliberately uses the Exodus word for the cross. Jesus\u2019 death is the new exodus: deliverance from a bondage deeper than Egypt\u2019s.`,
  otRef: 'Deuteronomy 4:20',
  ot: `"But the LORD has taken you and brought you out of the [A:iron furnace, out of Egypt], to be a people of his own inheritance."`,
  nt: `"And behold, two men were talking with him, Moses and Elijah, who appeared in glory and spoke of his [B:departure (exodon \u2014 \u2018exodus\u2019)], which he was about to accomplish at Jerusalem."\n\u2014 Luke 9:30\u201331`,
  hlKey: '[A] Egypt / iron furnace \u2014 the place of bondage \u00b7 [B] Exodos \u2014 Luke\u2019s word for the cross. Not "death," not "suffering" \u2014 exodus. Deliverance.',
  sources: 'Vos, Biblical Theology; Wright, The Climax of the Covenant',
  conns: ['P9', 'T9', 'C3', 'T1'],
  threads: []
},
// ── HISTORICAL ──
{
  id: 'H1', cat: 'Historical',
  title: 'Too Early for Legend',
  desc: 'The creed in 1 Corinthians 15 dates to within 2\u20135 years of the crucifixion \u2014 too early for legend to develop. Even atheist scholars agree on the dating.',
  date: '~30 AD', year: 30,
  whoa: `In 1 Corinthians 15:3\u20137, Paul records a creed using the technical rabbinic terms "received" and "delivered," indicating formal tradition that predates his letter. Scholars across the theological spectrum \u2014 including atheist Gerd L\u00fcdemann \u2014 date this creed\u2019s origin to within roughly 2\u20135 years of the crucifixion. This matters because legends require generational distance to develop. But this creed was circulating while the people it names were alive. Paul even adds: "most of the five hundred are still alive" \u2014 an explicit invitation to verify.`,
  otRef: null,
  ot: ``,
  nt: `"For I delivered to you as of first importance what I also received: that Christ died for our sins in accordance with the Scriptures, that he was buried, that he was raised on the third day in accordance with the Scriptures, and that he appeared to Cephas, then to the twelve. Then he appeared to more than five hundred brothers at one time, most of whom are still alive, though some have fallen asleep. Then he appeared to James, then to all the apostles."\n\u2014 1 Corinthians 15:3\u20137`,
  hlKey: '',
  sources: 'Habermas, The Historical Jesus; Licona, The Resurrection of Jesus; Wright, Resurrection of the Son of God; Dunn, Jesus Remembered',
  conns: ['S11', 'S3', 'P2', 'L2', 'H2', 'H4', 'H5', 'H6'],
  threads: ['thirdday']
},
{
  id: 'H2', cat: 'Historical',
  title: 'Even the Enemies Confirm the Facts',
  desc: 'Tacitus, Josephus, Pliny, the Talmud, Celsus \u2014 hostile sources confirm Jesus existed, was executed under Pilate, and performed acts they attribute to sorcery.',
  date: '~93 AD', year: 93,
  whoa: `Multiple non-Christian writers \u2014 some actively hostile to Christianity \u2014 confirm the basic facts of the narrative. What makes these sources significant is precisely their hostility: they have no motive to support Christian claims. Yet even their attacks confirm the underlying events. The enemies dispute the interpretation. They never dispute the events.`,
  otRef: null,

// ── ORGANIC LAYOUT ──
function seededRand(seed) {
  let s = seed;
  return () => { s = (s * 16807 + 11) % 2147483647; return (s & 0x7fffffff) / 0x7fffffff; };
}

const clusterCenters = {
  'Prophetic':   { cx: 340, cy: 260 },
  'Typological': { cx: 1100, cy: 240 },
  'Liturgical':  { cx: 1800, cy: 300 },
  'Covenantal':  { cx: 380, cy: 800 },
  'Structural':  { cx: 1100, cy: 850 },
  'Geographic':  { cx: 1800, cy: 780 },
  'Historical':  { cx: 1100, cy: 1300 },
};

const organicPositions = {};
function computeOrganicPositions() {
  const placed = [];
  nodes.forEach((node, i) => {
    const hash = node.id.split('').reduce((a, c, j) => a * 31 + c.charCodeAt(0) * (j + 1), 7);
    const rng = seededRand(hash);
    const center = clusterCenters[node.cat];
    const catNodes = nodes.filter(n => n.cat === node.cat);
    const catIdx = catNodes.indexOf(node);
    const spread = Math.min(catNodes.length * 22, 260);

    let x, y, attempts = 0;
    do {
      const angle = rng() * Math.PI * 2;
      const r = rng() * spread;
      x = center.cx + Math.cos(angle) * r;
      y = center.cy + Math.sin(angle) * r;
      attempts++;
    } while (attempts < 30 && placed.some(p => Math.abs(p.x - x) < 155 && Math.abs(p.y - y) < 70));

    // Small rotation for organic feel
    const rot = (rng() - 0.5) * 3;
    organicPositions[node.id] = { x, y, rot };
    placed.push({ x, y });
  });
}
computeOrganicPositions();

// ── THREAD FILTER POSITIONS ──
function getThreadPositions(threadNodeIds) {
  const count = threadNodeIds.length;
  const cols = Math.min(count, 4);
  const rows = Math.ceil(count / cols);
  const startX = 1100 - (cols * 230) / 2;
  const startY = 800 - (rows * 180) / 2;
  const positions = {};
  threadNodeIds.forEach((id, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    positions[id] = { x: startX + col * 230, y: startY + row * 180, rot: 0 };
  });
  return positions;
}

// ── APPLY TRANSFORM ──
function applyTransform() {
  canvasInner.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
}

// ── ZOOM / PAN HANDLERS ──
canvas.addEventListener('wheel', (e) => {
  if (currentMode !== 'thread') return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const oldZoom = zoom;
  zoom *= e.deltaY > 0 ? 0.93 : 1.07;
  zoom = Math.max(0.3, Math.min(2.5, zoom));
  panX = mx - (mx - panX) * (zoom / oldZoom);
  panY = my - (my - panY) * (zoom / oldZoom);
  applyTransform();
  drawConnections();
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
  if (currentMode !== 'thread') return;
  if (e.target.closest('.node')) return;
  isPanning = true;
  panStartX = e.clientX - panX;
  panStartY = e.clientY - panY;
  canvas.classList.add('panning');
});
window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  panX = e.clientX - panStartX;
  panY = e.clientY - panStartY;
  applyTransform();
  drawConnections();
});
window.addEventListener('mouseup', () => {
  isPanning = false;
  canvas.classList.remove('panning');
});

document.getElementById('zoomIn').addEventListener('click', () => {
  zoom = Math.min(2.5, zoom * 1.25);
  applyTransform(); drawConnections();
});
document.getElementById('zoomOut').addEventListener('click', () => {
  zoom = Math.max(0.3, zoom * 0.8);
  applyTransform(); drawConnections();
});
document.getElementById('zoomReset').addEventListener('click', () => {
  zoom = 0.55; panX = 0; panY = 0;
  applyTransform(); drawConnections();
});

// ── CREATE TIMELINE DOTS ──
function buildTimeline() {
  tlDotsContainer.innerHTML = '';
  tlSvg.innerHTML = '';
  tlAxis.innerHTML = '';

  const axisRect = tlAxis.getBoundingClientRect();
  const layerRect = timelineLayer.getBoundingClientRect();
  const axisLeft = axisRect.left - layerRect.left;
  const axisWidth = axisRect.width;
  const axisTop = axisRect.top - layerRect.top;

  // Year to X position
  const minY = -4000, maxY = 200;
  function yearToX(year) {
    const norm = (year - minY) / (maxY - minY);
    return axisLeft + norm * axisWidth;
  }

  // Era labels
  const eras = [
    { label: '4000 BC', year: -4000 },
    { label: '2000 BC', year: -2000 },
    { label: '1000 BC', year: -1000 },
    { label: '500 BC', year: -500 },
    { label: '0', year: 0 },
    { label: 'AD 100', year: 100 },
  ];
  eras.forEach(era => {
    const el = document.createElement('span');
    el.className = 'tl-era';
    el.textContent = era.label;
    el.style.left = yearToX(era.year) + 'px';
    tlAxis.appendChild(el);
  });

  // Sort nodes by year for staggered offset
  const sorted = [...nodes].sort((a, b) => a.year - b.year);
  const dotPositions = {};

  // Place dots with stagger to avoid overlap
  sorted.forEach((node, i) => {
    const x = yearToX(node.year);
    const color = catColors[node.cat];

    // Stagger vertically if close to neighbors
    let yOff = 0;
    const nearby = sorted.filter((n, j) => j !== i && Math.abs(yearToX(n.year) - x) < 18);
    if (nearby.length > 0) {
      const slot = sorted.filter(n => Math.abs(yearToX(n.year) - x) < 18).indexOf(node);
      yOff = (slot % 2 === 0 ? -1 : 1) * (Math.floor(slot / 2) + 1) * 14;
    }

    const dotX = x;
    const dotY = axisTop + yOff;
    dotPositions[node.id] = { x: dotX, y: dotY };

    const wrapper = document.createElement('div');
    wrapper.style.cssText = `position:absolute;left:${dotX}px;top:${dotY}px;`;
    wrapper.innerHTML = `
      <div class="tl-dot" style="background:${color};" data-id="${node.id}">
        <div class="tl-tooltip">
          <div class="tl-tooltip-title">${node.title}</div>
          <div class="tl-tooltip-meta">${node.id} · ${node.date}</div>
        </div>
      </div>
      <div class="tl-dot-label">${node.id}</div>
    `;
    wrapper.querySelector('.tl-dot').addEventListener('click', () => openReading(node));
    wrapper.querySelector('.tl-dot').addEventListener('mouseenter', () => {
      hoveredNodeId = node.id;
      drawTimelineArcs(dotPositions);
    });
    wrapper.querySelector('.tl-dot').addEventListener('mouseleave', () => {
      hoveredNodeId = null;
      drawTimelineArcs(dotPositions);
    });
    tlDotsContainer.appendChild(wrapper);
  });

  drawTimelineArcs(dotPositions);
}

function drawTimelineArcs(dotPositions) {
  tlSvg.innerHTML = '';
  const hovConns = hoveredNodeId ? (nodes.find(n => n.id === hoveredNodeId)?.conns || []) : [];

  connectionPairs.forEach(([aId, bId]) => {
    const a = dotPositions[aId];
    const b = dotPositions[bId];
    if (!a || !b) return;

    const isHoverArc = hoveredNodeId && (aId === hoveredNodeId || bId === hoveredNodeId);
    const isHovering = hoveredNodeId !== null;

    const dist = Math.abs(b.x - a.x);
    const arcH = 30 + dist * 0.08;
    const peakY = Math.min(a.y, b.y) - arcH;
    const midX = (a.x + b.x) / 2;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${a.x} ${a.y} Q ${midX} ${peakY} ${b.x} ${b.y}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', 'var(--accent)');
    path.setAttribute('stroke-width', isHoverArc ? '1.5' : '0.8');
    path.setAttribute('opacity', isHovering ? (isHoverArc ? '0.6' : '0.04') : '0.12');
    tlSvg.appendChild(path);
  });
}

// ── POSITION NODES ──
function positionNodes() {
  const isFiltered = currentThread !== 'all';
  const activeIds = isFiltered ? threads[currentThread] : [];
  const threadPos = isFiltered ? getThreadPositions(activeIds) : null;

  nodes.forEach(node => {
    const el = document.getElementById(`node-${node.id}`);
    if (currentMode !== 'thread') {
      el.style.opacity = '0';
      el.style.pointerEvents = 'none';
      return;
    }

    let pos;
    if (isFiltered) {
      if (activeIds.includes(node.id)) {
        pos = threadPos[node.id];
        el.classList.add('expanded');
        el.classList.remove('dimmed');
        el.style.opacity = '1';
        el.style.pointerEvents = 'auto';
      } else {
        pos = organicPositions[node.id];
        el.classList.remove('expanded');
        el.classList.add('dimmed');
        el.style.opacity = '';
        el.style.pointerEvents = '';
      }
    } else {
      pos = organicPositions[node.id];
      el.classList.remove('expanded', 'dimmed', 'highlighted');
      el.style.opacity = '1';
      el.style.pointerEvents = 'auto';
    }

    el.style.left = pos.x + 'px';
    el.style.top = pos.y + 'px';
    el.style.transform = `rotate(${pos.rot || 0}deg)`;
  });
}

// ── DRAW CONNECTIONS (thread mode) ──
function drawConnections() {
  connectionsSvg.innerHTML = '';
  if (currentMode !== 'thread') return;

  const isFiltered = currentThread !== 'all';
  const activeIds = isFiltered ? threads[currentThread] : [];
  const hovConns = hoveredNodeId ? (nodes.find(n => n.id === hoveredNodeId)?.conns || []) : [];

  // SVG needs to match the canvas-inner coordinate space
  connectionsSvg.setAttribute('width', '2200');
  connectionsSvg.setAttribute('height', '1600');
  connectionsSvg.style.width = '2200px';
  connectionsSvg.style.height = '1600px';

  connectionPairs.forEach(([aId, bId]) => {
    const aEl = document.getElementById(`node-${aId}`);
    const bEl = document.getElementById(`node-${bId}`);
    if (!aEl || !bEl) return;

    const ax = parseFloat(aEl.style.left) + 72;
    const ay = parseFloat(aEl.style.top) + 30;
    const bx = parseFloat(bEl.style.left) + 72;
    const by = parseFloat(bEl.style.top) + 30;

    const isHoverLine = hoveredNodeId && (aId === hoveredNodeId || bId === hoveredNodeId);
    const isHovering = hoveredNodeId !== null;
    const isThreadLine = isFiltered && activeIds.includes(aId) && activeIds.includes(bId);

    let stroke, width, opacity, dash;
    if (isHovering) {
      stroke = isHoverLine ? 'var(--accent)' : 'var(--border)';
      width = isHoverLine ? '1.5' : '0.5';
      opacity = isHoverLine ? '0.6' : '0.04';
      dash = isHoverLine ? null : '3,5';
    } else if (isFiltered) {
      stroke = isThreadLine ? 'var(--accent)' : 'var(--border)';
      width = isThreadLine ? '1.5' : '0.5';
      opacity = isThreadLine ? '0.5' : '0.03';
      dash = isThreadLine ? null : '3,5';
    } else {
      stroke = 'var(--border)';
      width = '0.8';
      opacity = '0.25';
      dash = '4,6';
    }

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', ax); line.setAttribute('y1', ay);
    line.setAttribute('x2', bx); line.setAttribute('y2', by);
    line.setAttribute('stroke', stroke);
    line.setAttribute('stroke-width', width);
    line.setAttribute('opacity', opacity);
    if (dash) line.setAttribute('stroke-dasharray', dash);
    connectionsSvg.appendChild(line);
  });
}

// ── HOVER HIGHLIGHTING ──
function applyHover() {
  if (currentMode !== 'thread') return;
  const isFiltered = currentThread !== 'all';
  const activeIds = isFiltered ? threads[currentThread] : [];
  const connIds = hoveredNodeId
    ? nodes.find(n => n.id === hoveredNodeId)?.conns.filter(cId => nodes.find(x => x.id === cId)) || []
    : [];

  nodes.forEach(node => {
    const el = document.getElementById(`node-${node.id}`);
    if (hoveredNodeId) {
      const isConn = node.id === hoveredNodeId || connIds.includes(node.id);
      if (isFiltered && !activeIds.includes(node.id)) {
        el.classList.add('dimmed');
        el.classList.remove('highlighted');
      } else {
        el.classList.toggle('dimmed', !isConn);
        el.classList.toggle('highlighted', isConn);
      }
    } else {
      if (isFiltered) {
        el.classList.toggle('dimmed', !activeIds.includes(node.id));
        el.classList.remove('highlighted');
      } else {
        el.classList.remove('dimmed', 'highlighted');
      }
    }
  });
  drawConnections();
}

// ── READING PANEL ──
function parseHighlights(text) {
  return text.replace(/\[([A-H]):([^\]]+)\]/g,
    '<span class="hl hl-$1" data-hl="$1">$2</span>');
}
function renderText(text) {
  if (!text) return '';
  let html = parseHighlights(text);
  html = html.replace(/\n\n/g, '<br><br>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function openReading(node) {
  const color = catColors[node.cat];
  rpHeaderLabel.textContent = `${node.id} — ${node.cat}`;
  rpHeaderLabel.style.color = color;

  const connHtml = node.conns.map(cId => {
    const cn = nodes.find(n => n.id === cId);
    if (!cn) return `<li><span class="conn-id">${cId}</span><span style="color:var(--text-muted)">(not loaded)</span></li>`;
    return `<li onclick="openReading(nodes.find(n=>n.id==='${cId}'))"><span class="conn-id">${cn.id}</span>${cn.title}</li>`;
  }).join('');

  const hasOt = node.ot && node.ot.trim();
  const hasNt = node.nt && node.nt.trim();
  const hasHlKey = node.hlKey && node.hlKey.trim();
  const isPattern = !node.otRef;

  let contentHtml = `
    <div class="rp-id" style="color:${color}"><span class="rp-cat-dot" style="background:${color}"></span>${node.cat}</div>
    <h2>${node.title}</h2>
    <div class="rp-date">${node.date}</div>
    <div class="rp-section">
      <div class="rp-section-title">The Whoa</div>
      <div class="rp-text">${node.whoa}</div>
    </div>`;

  if (isPattern) {
    if (hasOt) contentHtml += `<div class="rp-section"><div class="rp-section-title">The Pattern</div><div class="rp-text">${renderText(node.ot)}</div></div>`;
    if (hasNt) contentHtml += `<div class="rp-section"><div class="rp-section-title">NT Fulfillment</div><div class="rp-text">${renderText(node.nt)}</div></div>`;
  } else {
    if (hasOt) contentHtml += `<div class="rp-section"><div class="rp-section-title">OT Text</div><div class="rp-ref">${node.otRef}</div><div class="rp-text">${renderText(node.ot)}</div></div>`;
    if (hasNt) contentHtml += `<div class="rp-section"><div class="rp-section-title">NT Text</div><div class="rp-text">${renderText(node.nt)}</div></div>`;
  }

  if (hasHlKey) contentHtml += `<div class="rp-section"><div class="rp-section-title">Highlight Key</div><div class="hl-key">${node.hlKey}</div></div>`;

  contentHtml += `
    <div class="rp-section"><div class="rp-section-title">Sources</div><div class="rp-sources">${node.sources}</div></div>
    <div class="rp-section"><div class="rp-section-title">Connections</div><ul class="rp-connections-list">${connHtml}</ul></div>`;

  rpContent.innerHTML = contentHtml;

  rpContent.querySelectorAll('.hl').forEach(span => {
    span.addEventListener('mouseenter', () => {
      rpContent.querySelectorAll(`.hl[data-hl="${span.dataset.hl}"]`).forEach(s => s.classList.add('active'));
    });
    span.addEventListener('mouseleave', () => {
      rpContent.querySelectorAll(`.hl[data-hl="${span.dataset.hl}"]`).forEach(s => s.classList.remove('active'));
    });
  });

  readingPanel.classList.add('open');
  readingOverlay.classList.add('open');
  readingPanel.scrollTop = 0;
}

function closeReading() {
  readingPanel.classList.remove('open');
  readingOverlay.classList.remove('open');
}

document.getElementById('rpClose').addEventListener('click', closeReading);
readingOverlay.addEventListener('click', closeReading);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReading(); });

// ── MODE SWITCHING ──
function setMode(mode) {
  currentMode = mode;
  closeReading();

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });

  threadBar.classList.toggle('visible', mode === 'thread');
  canvas.style.display = mode === 'thread' ? '' : 'none';
  timelineLayer.classList.toggle('visible', mode === 'timeline');
  textList.classList.toggle('visible', mode === 'text');
  zoomControls.style.display = mode === 'thread' ? '' : 'none';

  nodes.forEach(node => {
    const el = document.getElementById(`node-${node.id}`);
    el.classList.remove('dimmed', 'highlighted', 'expanded');
  });

  if (mode === 'thread') {
    positionNodes();
    applyTransform();
    setTimeout(() => drawConnections(), 50);
    setTimeout(() => drawConnections(), 900);
  }

  if (mode === 'timeline') {
    setTimeout(buildTimeline, 100);
  }
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.mode));
});

// ── THREAD SWITCHING ──
document.querySelectorAll('.thread-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentThread = btn.dataset.thread;
    document.querySelectorAll('.thread-btn').forEach(b => b.classList.toggle('active', b === btn));
    hoveredNodeId = null;
    positionNodes();
    setTimeout(() => drawConnections(), 50);
    setTimeout(() => drawConnections(), 700);
  });
});

// ── INIT ──
positionNodes();
applyTransform();
setTimeout(() => drawConnections(), 100);

window.addEventListener('resize', () => {
  if (currentMode === 'thread') drawConnections();
  if (currentMode === 'timeline') buildTimeline();
});

window.nodes = nodes;
window.openReading = openReading;
</script>

</body>
</html>
